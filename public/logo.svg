<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#glowGrad)" stroke="#1e293b" stroke-width="4"/>

  <!-- Glowing Abstract Soundwaves -->
  <g filter="url(#neonGlow)">
    <rect x="120" y="220" width="24" height="72" rx="12" fill="url(#neonGrad)" opacity="0.6"/>
    <rect x="164" y="160" width="24" height="192" rx="12" fill="url(#neonGrad)" opacity="0.8"/>
    <rect x="208" y="100" width="24" height="312" rx="12" fill="url(#neonGrad)"/>
    <rect x="252" y="140" width="24" height="232" rx="12" fill="url(#neonGrad)"/>
    <rect x="296" y="180" width="24" height="152" rx="12" fill="url(#neonGrad)" opacity="0.9"/>
    <rect x="340" y="210" width="24" height="92" rx="12" fill="url(#neonGrad)" opacity="0.7"/>
    <rect x="384" y="240" width="24" height="42" rx="12" fill="url(#neonGrad)" opacity="0.5"/>
  </g>

  <!-- Speech Caption Bubble overlay -->
  <path d="M 120,380 L 150,420 L 190,380 Z" fill="#ffffff" filter="url(#neonGlow)" />
  <rect x="100" y="330" width="312" height="60" rx="30" fill="#ffffff" />
  
  <!-- Text inside Bubble (Caption representation) -->
  <text x="256" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="4">
    ଓଡ଼ିଆ • CC
  </text>
</svg>
